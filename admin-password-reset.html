<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen w-full flex items-center justify-center bg-white p-4">
    <div class="w-full max-w-[380px] space-y-5">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-zinc-900">Reset Admin Password</h1>
            <p class="text-sm text-zinc-500 mt-2">Use a strong password (minimum 12 characters).</p>
        </div>

        <form id="resetForm" class="space-y-3 border border-zinc-200 rounded-xl p-5 shadow-sm bg-white">
            <input id="oldPassword" type="password" placeholder="Current password" class="w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" required>
            <input id="newPassword" type="password" placeholder="New password" class="w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" minlength="12" required>
            <input id="confirmPassword" type="password" placeholder="Confirm new password" class="w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" minlength="12" required>
            <p id="resetError" class="text-xs text-red-600 hidden"></p>
            <button type="submit" class="w-full bg-zinc-900 text-white rounded-md py-2.5 text-sm font-semibold hover:bg-zinc-800 transition">Update Password</button>
        </form>
    </div>

    <script>
        let CSRF_TOKEN = '';

        async function ensureCsrfToken() {
            if (CSRF_TOKEN) return CSRF_TOKEN;
            const res = await fetch('backend/auth.php?action=csrf');
            const json = await res.json();
            if (!res.ok || json.status !== 'success' || !json.csrf_token) {
                throw new Error(json.message || 'Session expired. Please login again.');
            }
            CSRF_TOKEN = json.csrf_token;
            return CSRF_TOKEN;
        }

        const form = document.getElementById('resetForm');
        const err = document.getElementById('resetError');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            err.classList.add('hidden');
            const btn = form.querySelector('button');
            const oldText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'Updating...';

            const payload = {
                old_password: document.getElementById('oldPassword').value,
                new_password: document.getElementById('newPassword').value,
                confirm_password: document.getElementById('confirmPassword').value
            };

            try {
                const csrf = await ensureCsrfToken();
                const res = await fetch('backend/auth.php?action=reset_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrf
                    },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                if (json.status !== 'success') {
                    throw new Error(json.message || 'Reset failed.');
                }
                window.location.href = 'admin-dashboard.php';
            } catch (e2) {
                err.textContent = e2.message || 'Reset failed.';
                err.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = oldText;
            }
        });

        ensureCsrfToken().catch((e) => {
            err.textContent = e.message || 'Session expired. Please login again.';
            err.classList.remove('hidden');
        });
    </script>
    <script src="js/image-protect.js"></script>
</body>
</html>

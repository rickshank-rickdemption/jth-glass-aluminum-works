<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Recover Admin Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-white p-4 flex items-center justify-center">
    <div class="w-full max-w-[420px] space-y-5">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-zinc-900">Recover Admin Access</h1>
            <p class="text-sm text-zinc-500 mt-2">Reset password using OTP sent to admin recovery email.</p>
        </div>

        <form id="recoverForm" class="border border-zinc-200 rounded-xl p-5 shadow-sm bg-white space-y-3">
            <div>
                <label class="text-xs font-semibold text-zinc-600 uppercase tracking-wide">Admin Username</label>
                <input id="adminUser" type="text" placeholder="admin" class="mt-1 w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" required>
            </div>

            <div class="grid grid-cols-[1fr_auto] gap-2">
                <div>
                    <label class="text-xs font-semibold text-zinc-600 uppercase tracking-wide">OTP Code</label>
                    <input id="otpCode" type="text" maxlength="6" inputmode="numeric" placeholder="123456" class="mt-1 w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" required>
                </div>
                <button id="btnSendOtp" type="button" class="self-end h-10 px-3 rounded-md border border-zinc-300 bg-white text-zinc-700 text-xs font-semibold hover:bg-zinc-50 transition">Send OTP</button>
            </div>

            <div>
                <label class="text-xs font-semibold text-zinc-600 uppercase tracking-wide">New Password</label>
                <input id="newPassword" type="password" minlength="12" class="mt-1 w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" required>
            </div>
            <div>
                <label class="text-xs font-semibold text-zinc-600 uppercase tracking-wide">Confirm Password</label>
                <input id="confirmPassword" type="password" minlength="12" class="mt-1 w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" required>
            </div>
            <p id="recoverInfo" class="text-xs text-zinc-500 hidden"></p>
            <p id="recoverError" class="text-xs text-red-600 hidden"></p>
            <button type="submit" class="w-full bg-zinc-900 text-white rounded-md py-2.5 text-sm font-semibold hover:bg-zinc-800 transition">Reset Password</button>
            <p class="text-center">
                <a href="admin-login.html" class="text-xs text-zinc-500 hover:text-zinc-900 underline">Back to login</a>
            </p>
        </form>
    </div>

    <script>
        const form = document.getElementById('recoverForm');
        const err = document.getElementById('recoverError');
        const info = document.getElementById('recoverInfo');
        const btnSendOtp = document.getElementById('btnSendOtp');

        function showErr(msg) {
            err.textContent = msg || 'Recovery failed.';
            err.classList.remove('hidden');
        }

        function showInfo(msg) {
            info.textContent = msg || '';
            info.classList.toggle('hidden', !msg);
        }

        function clearMsgs() {
            err.classList.add('hidden');
            info.classList.add('hidden');
        }

        btnSendOtp.addEventListener('click', async () => {
            clearMsgs();
            const username = String(document.getElementById('adminUser').value || '').trim();
            if (!username) {
                showErr('Admin username is required.');
                return;
            }
            const oldText = btnSendOtp.textContent;
            btnSendOtp.disabled = true;
            btnSendOtp.textContent = 'Sending...';
            try {
                const res = await fetch('backend/auth.php?action=forgot_password_send_otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const json = await res.json();
                if (!res.ok || json.status !== 'success') {
                    throw new Error(json.message || 'Unable to send OTP.');
                }
                showInfo('OTP sent to admin recovery email.');
            } catch (e) {
                showErr(e.message || 'Unable to send OTP.');
            } finally {
                btnSendOtp.disabled = false;
                btnSendOtp.textContent = oldText;
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMsgs();
            const btn = form.querySelector('button[type="submit"]');
            const oldText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            const payload = {
                username: String(document.getElementById('adminUser').value || '').trim(),
                otp_code: String(document.getElementById('otpCode').value || '').replace(/\D+/g, ''),
                new_password: document.getElementById('newPassword').value,
                confirm_password: document.getElementById('confirmPassword').value
            };

            try {
                const res = await fetch('backend/auth.php?action=forgot_password_verify_reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                if (!res.ok || json.status !== 'success') {
                    throw new Error(json.message || 'Recovery failed.');
                }
                showInfo('Password reset successful. Redirecting to login...');
                setTimeout(() => {
                    window.location.href = 'admin-login.html';
                }, 1000);
            } catch (e2) {
                showErr(e2.message || 'Recovery failed.');
                btn.disabled = false;
                btn.textContent = oldText;
            }
        });
    </script>
    <script src="js/image-protect.js"></script>
</body>
</html>

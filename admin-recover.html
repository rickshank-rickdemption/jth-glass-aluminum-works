<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Admin Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-white p-4 flex items-center justify-center">
    <div class="w-full max-w-[420px] space-y-5">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-zinc-900">Recover Admin Access</h1>
            <p class="text-sm text-zinc-500 mt-2">Use your recovery code and authenticator code to reset password.</p>
        </div>

        <form id="recoverForm" class="border border-zinc-200 rounded-xl p-5 shadow-sm bg-white space-y-3">
            <div>
                <label class="text-xs font-semibold text-zinc-600 uppercase tracking-wide">Recovery Code</label>
                <input id="recoveryCode" type="text" placeholder="ABCDE-FGHIJ-KLMNO-PQRST" class="mt-1 w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" required>
            </div>
            <div>
                <label class="text-xs font-semibold text-zinc-600 uppercase tracking-wide">Authenticator Code</label>
                <input id="totpCode" type="text" maxlength="6" placeholder="123456" class="mt-1 w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" required>
            </div>
            <div>
                <label class="text-xs font-semibold text-zinc-600 uppercase tracking-wide">New Password</label>
                <input id="newPassword" type="password" minlength="12" class="mt-1 w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" required>
            </div>
            <div>
                <label class="text-xs font-semibold text-zinc-600 uppercase tracking-wide">Confirm Password</label>
                <input id="confirmPassword" type="password" minlength="12" class="mt-1 w-full border border-zinc-200 rounded-md px-3 py-2 text-sm outline-none focus:border-zinc-900" required>
            </div>
            <p id="recoverError" class="text-xs text-red-600 hidden"></p>
            <button type="submit" class="w-full bg-zinc-900 text-white rounded-md py-2.5 text-sm font-semibold hover:bg-zinc-800 transition">Reset Password</button>
            <p class="text-center">
                <a href="admin-login.html" class="text-xs text-zinc-500 hover:text-zinc-900 underline">Back to login</a>
            </p>
        </form>

        <div id="recoverDone" class="hidden border border-emerald-200 bg-emerald-50 rounded-xl p-5 space-y-3">
            <div class="text-sm font-semibold text-emerald-800">Password reset successful</div>
            <p class="text-xs text-emerald-900">Save this new recovery code offline. Your old recovery code is now invalid.</p>
            <code id="newRecoveryCode" class="block text-sm font-bold bg-white border border-emerald-200 rounded p-2"></code>
            <button id="btn-login" class="w-full bg-zinc-900 text-white rounded-md py-2.5 text-sm font-semibold hover:bg-zinc-800 transition">Go to Login</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('recoverForm');
        const err = document.getElementById('recoverError');
        const done = document.getElementById('recoverDone');

        function showErr(msg) {
            err.textContent = msg || 'Recovery failed.';
            err.classList.remove('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            err.classList.add('hidden');
            const btn = form.querySelector('button[type="submit"]');
            const oldText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            const payload = {
                recovery_code: String(document.getElementById('recoveryCode').value || '').trim().toUpperCase(),
                totp_code: String(document.getElementById('totpCode').value || '').replace(/\D+/g, ''),
                new_password: document.getElementById('newPassword').value,
                confirm_password: document.getElementById('confirmPassword').value
            };

            try {
                const res = await fetch('backend/auth.php?action=recover_reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                if (!res.ok || json.status !== 'success') {
                    throw new Error(json.message || 'Recovery failed.');
                }
                document.getElementById('newRecoveryCode').textContent = json.new_recovery_code || '';
                form.classList.add('hidden');
                done.classList.remove('hidden');
            } catch (e2) {
                showErr(e2.message || 'Recovery failed.');
                btn.disabled = false;
                btn.textContent = oldText;
            }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            window.location.href = 'admin-login.html';
        });
    </script>
    <script src="js/image-protect.js"></script>
</body>
</html>
